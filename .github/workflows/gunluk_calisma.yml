name: Minerva Günlük Güncelleme

on:
  schedule:
    - cron: '0 17 * * 1-5'  # Her hafta içi 20:00 Türkiye (17:00 UTC)
  workflow_dispatch:

jobs:
  guncelle-ve-tara:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install psycopg2-binary yfinance pandas numpy scipy scikit-learn python-dotenv

      - name: Veri güncelle (Yahoo Finance → stock_prices)
        env:
          EXT_DB_HOST: ${{ secrets.EXT_DB_HOST }}
          EXT_DB_PORT: ${{ secrets.EXT_DB_PORT }}
          EXT_DB_NAME: ${{ secrets.EXT_DB_NAME }}
          EXT_DB_USER: ${{ secrets.EXT_DB_USER }}
          EXT_DB_PASSWORD: ${{ secrets.EXT_DB_PASSWORD }}
        run: python minerva/veri_guncelle.py

      - name: Anomali tespiti (Z-Score hesaplama)
        env:
          EXT_DB_HOST: ${{ secrets.EXT_DB_HOST }}
          EXT_DB_PORT: ${{ secrets.EXT_DB_PORT }}
          EXT_DB_NAME: ${{ secrets.EXT_DB_NAME }}
          EXT_DB_USER: ${{ secrets.EXT_DB_USER }}
          EXT_DB_PASSWORD: ${{ secrets.EXT_DB_PASSWORD }}
        run: python minerva/anomali_tespit_ext.py

      - name: Fiyat sıkışması taraması (Radar1 + Radar2)
        env:
          EXT_DB_HOST: ${{ secrets.EXT_DB_HOST }}
          EXT_DB_PORT: ${{ secrets.EXT_DB_PORT }}
          EXT_DB_NAME: ${{ secrets.EXT_DB_NAME }}
          EXT_DB_USER: ${{ secrets.EXT_DB_USER }}
          EXT_DB_PASSWORD: ${{ secrets.EXT_DB_PASSWORD }}
        run: python minerva/tarama_calistir.py
